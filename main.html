<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flipper</title>
    <style>
        #red {
            background-color: red;
        }

        #blue {
            background-color: blue;
        }

        #yellow {
            background-color: yellow;
        }

        button {
            border-radius: 20px;
            height: 25px;
            width: 100px;
            margin: 10px;
        }
    </style>
</head>

<body>
    <h3>Color Flipper</h3>
    <button id="red" onclick="colorChange('red')">Red</button>
    <button id="blue" onclick="colorChange('blue')">Blue</button>
    <button id="yellow" onclick="colorChange('yellow')">Yellow</button>
    <button onclick="setRandom()">Random</button>

    <script src="index.js"></script>
</body>

</html>
